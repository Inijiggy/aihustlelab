<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Hustle Lab</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
}

/* Glow background */
.bg-glow {
    position: absolute;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(59,130,246,0.3), transparent);
    filter: blur(120px);
}

/* Glass */
.glass {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
}

/* Card hover */
.card {
    transition: all 0.3s ease;
}
.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 40px rgba(59,130,246,0.2);
}

/* Button */
.glow-btn {
    background: linear-gradient(135deg,#3b82f6,#2563eb);
    box-shadow: 0 10px 25px rgba(59,130,246,0.4);
}
.glow-btn:hover {
    transform: scale(1.05);
}

/* Fade animation */
.fade-in {
    animation: fadeIn 0.6s ease forwards;
}
@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body class="flex flex-col items-center px-6 py-10">

<div class="bg-glow"></div>

<!-- HERO -->
<div class="text-center max-w-2xl mb-12 fade-in">
    <h1 class="text-5xl font-extrabold tracking-tight">
        AIHUSTLELAB
    </h1>

    <p class="text-gray-400 mt-4 text-lg">
        Build your first ₹1,000 with AI in 24 hours.
    </p>
</div>

<!-- INPUT -->
<div class="flex gap-3 w-full max-w-2xl mb-8 fade-in">
    <input id="userInput"
    placeholder="Fitness, Coding, Anime..."
    class="flex-1 p-4 rounded-xl bg-white/5 border border-white/10 focus:outline-none focus:ring-2 focus:ring-blue-500">

    <button onclick="startAnalysis()"
    class="glow-btn px-6 py-4 rounded-xl font-semibold">
    Generate
    </button>
</div>

<div id="loading" class="hidden text-gray-400 mb-6">
    Generating roadmap...
</div>

<!-- RESULTS -->
<div id="resultOutput" class="hidden w-full max-w-2xl space-y-6"></div>

<script>
function startAnalysis(){
    const niche = document.getElementById("userInput").value;

    if(!niche){
        alert("Enter interest");
        return;
    }

    document.getElementById("loading").classList.remove("hidden");

    setTimeout(()=>{
        document.getElementById("loading").classList.add("hidden");

        const output = document.getElementById("resultOutput");
        output.classList.remove("hidden");

        output.innerHTML = `
        <h2 class="text-2xl font-bold text-blue-400 fade-in">
        💰 How to make ₹1,000 with "${niche}" in 24 hours
        </h2>

        ${cardHTML("Video Localization Agency",
        "Use HeyGen → translate videos → charge ₹2,000/video",
        "https://heygen.com")}

        ${cardHTML("AI Newsletter",
        "Use Beehiiv → curate content → monetize with ads",
        "https://beehiiv.com")}

        ${cardHTML("AI Content Service",
        "Write blogs using AI → charge ₹1,000/article",
        "https://jasper.ai")}

        <div class="glass p-8 rounded-2xl text-center mt-8 fade-in">
            <p class="text-gray-300 mb-4 text-lg">
            🔥 Get 10 High-Paying AI Niches + full playbook
            </p>

            <input id="vipEmail"
            placeholder="Enter your email"
            class="bg-white/5 border border-white/10 px-4 py-3 rounded-lg w-full mb-4 text-center">

            <button onclick="joinVIP()"
            class="glow-btn px-6 py-3 rounded-lg font-semibold w-full">
            Join VIP →
            </button>
        </div>
        `;
    },1000);
}

function cardHTML(title, desc, link){
    return `
    <div class="glass card p-6 rounded-2xl fade-in">
        <h3 class="text-lg font-semibold mb-2">${title}</h3>

        <p class="text-gray-300">${desc}</p>

        <p class="text-green-400 mt-2 text-sm">
        🔥 Works well
        </p>

        <button onclick="window.open('${link}','_blank')"
        class="glow-btn mt-5 w-full py-3 rounded-lg font-semibold">
        🚀 Start
        </button>
    </div>
    `;
}

function joinVIP(){
    const email = document.getElementById("vipEmail").value;

    if(!email){
        alert("Enter email");
        return;
    }

    alert("Saved (connect SheetDB next)");
}
</script>

</body>
</html>
