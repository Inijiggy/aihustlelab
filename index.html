<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Hustle Lab</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: linear-gradient(180deg,#0b0f1a,#000);
    color: white;
}
.glass {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body class="flex flex-col items-center p-6">

<h1 class="text-4xl font-bold mb-2">
AIHUSTLELAB
</h1>

<p class="text-gray-400 mb-6">
The 24-Hour Revenue Engine
</p>

<div class="flex gap-2 w-full max-w-xl">
<input id="userInput" placeholder="Fitness, Coding, Anime..."
class="flex-1 p-3 rounded bg-white/10 text-white outline-none">

<button onclick="startAnalysis()"
class="bg-blue-600 px-6 py-3 rounded font-bold">
Generate Roadmap
</button>
</div>

<div id="loading" class="hidden mt-6">
Analyzing...
</div>

<div id="resultOutput" class="hidden mt-10 w-full max-w-xl space-y-6"></div>

<script>
function startAnalysis(){
    const niche = document.getElementById("userInput").value;

    if(!niche){
        alert("Enter interest");
        return;
    }

    document.getElementById("loading").classList.remove("hidden");

    setTimeout(()=>{
        document.getElementById("loading").classList.add("hidden");

        const output = document.getElementById("resultOutput");
        output.classList.remove("hidden");

        output.innerHTML = `
        <h2 class="text-2xl font-bold text-blue-400">
        💰 24-hour plan for "${niche}"
        </h2>

        <div class="glass p-6 rounded-2xl">
            <h3 class="font-bold mb-2">1. Video Localization Agency</h3>
            <p>Use HeyGen → translate videos → charge ₹2,000/video</p>
            <p class="text-green-400 mt-2 font-semibold">
            🔥 Works well in ${niche}
            </p>

            <a href="https://heygen.com" target="_blank"
            class="block mt-4 bg-blue-600 py-3 text-center rounded-lg font-bold">
            🚀 Start with HeyGen
            </a>
        </div>

        <div class="glass p-6 rounded-2xl">
            <h3 class="font-bold mb-2">2. AI Newsletter</h3>
            <p>Use Beehiiv → curate niche content → monetize with ads</p>
            <p class="text-green-400 mt-2 font-semibold">
            🔥 Works well in ${niche}
            </p>

            <a href="https://beehiiv.com" target="_blank"
            class="block mt-4 border border-blue-500 py-3 text-center rounded-lg font-bold">
            🚀 Setup Beehiiv
            </a>
        </div>

        <div class="glass p-6 rounded-2xl">
            <h3 class="font-bold mb-2">3. AI Content Service</h3>
            <p>Write blogs using AI → charge ₹1,000/article</p>
            <p class="text-green-400 mt-2 font-semibold">
            🔥 Works well in ${niche}
            </p>

            <a href="https://jasper.ai" target="_blank"
            class="block mt-4 border border-white py-3 text-center rounded-lg font-bold">
            🚀 Start with Jasper
            </a>
        </div>

        <div class="mt-10 p-6 border border-dashed text-center">
            <p class="text-gray-400 mb-4">
            🔥 Want Top 10 High-Paying AI Niches + full playbook?
            </p>

            <input id="vipEmail" placeholder="Enter email"
            class="bg-white/10 px-3 py-2 rounded mb-3 w-full text-center">

            <button onclick="joinVIP()"
            class="bg-blue-600 px-6 py-2 rounded font-bold">
            Join VIP →
            </button>
        </div>
        `;
    },1200);
}

function joinVIP(){
    const email = document.getElementById("vipEmail").value;

    if(!email){
        alert("Enter email");
        return;
    }

    alert("Saved! (connect SheetDB later)");
}
</script>

</body>
</html>
